name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  workflow-lint:
    name: Workflow lint
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install actionlint
        env:
          ACTIONLINT_VERSION: 1.7.12
        run: |
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" -o actionlint.tar.gz
          tar -xzf actionlint.tar.gz actionlint

      - name: Run actionlint
        run: ./actionlint

  linux-build-test-package:
    name: Linux build, test, and package
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            lld \
            llvm \
            patchelf \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-${{ runner.os }}
          workspaces: |
            pc/receiver -> target
            pc/app/src-tauri -> target

      - name: Install cargo-xwin
        run: cargo install cargo-xwin --locked

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Run deterministic tests
        run: make test

      - name: Cross-build Windows portable app
        run: make pc

      - name: Stage Windows release files
        shell: bash
        run: |
          mkdir -p dist/pc
          cp pc/target/x86_64-pc-windows-msvc/release/ds-controller.exe dist/pc/ds-controller.exe

          web_view_loaders=(pc/target/x86_64-pc-windows-msvc/release/build/webview2-com-sys-*/out/x64/WebView2Loader.dll)
          if [ ! -e "${web_view_loaders[0]}" ]; then
            printf '%s\n' 'WebView2Loader.dll was not produced by webview2-com-sys' >&2
            exit 1
          fi
          cp "${web_view_loaders[0]}" dist/pc/WebView2Loader.dll

          ls -l dist/pc

      - name: Upload Windows portable app
        uses: actions/upload-artifact@v4
        with:
          name: ds-controller-pc-app
          path: dist/pc
          if-no-files-found: error
          retention-days: 7
          compression-level: 0

  nds-rom-build:
    name: NDS ROM build
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      DEVKITARM_IMAGE: devkitpro/devkitarm:20260221@sha256:4debd5b33cf4361a557b6bf3be5ff823804868125ce1429912f1a4e773e7ac5d

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build NDS ROM
        run: make nds DEVKITARM_IMAGE="$DEVKITARM_IMAGE" PC_IP=192.0.2.1 PC_PORT=26760

      - name: Stage NDS release files
        run: |
          mkdir -p dist/nds
          cp nds/build/ds-controller.nds dist/nds/ds-controller.nds
          cp nds/ds-controller.ini dist/nds/ds-controller.ini

      - name: Upload NDS release files
        uses: actions/upload-artifact@v4
        with:
          name: ds-controller-nds
          path: dist/nds
          if-no-files-found: error
          retention-days: 7
          compression-level: 0
