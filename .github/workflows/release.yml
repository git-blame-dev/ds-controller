name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

permissions:
  actions: read
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_sha || github.sha }}
  cancel-in-progress: false

jobs:
  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Generate calendar version
        id: version
        shell: bash
        run: |
          date_part="$(date -u +'%Y.%m.%d')"
          version="v${date_part}.${GITHUB_RUN_NUMBER}"
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"

      - name: Determine release scope
        id: release_scope
        env:
          TARGET_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          previous_tag="$(git describe --tags --abbrev=0 "${TARGET_SHA}^" 2>/dev/null || true)"

          if [ -z "$previous_tag" ]; then
            printf 'should_publish=true\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed_files="$(git diff --name-only "${previous_tag}..${TARGET_SHA}")"
          has_release_relevant_change=false

          while IFS= read -r path; do
            [ -n "$path" ] || continue

            case "$path" in
              .github/*|AGENTS.md|README.md|docs/*|tasks/*)
                ;;
              *)
                has_release_relevant_change=true
                ;;
            esac
          done <<EOF
          $changed_files
          EOF

          printf 'Changed files since %s:\n%s\n' "$previous_tag" "$changed_files"
          printf 'should_publish=%s\n' "$has_release_relevant_change" >> "$GITHUB_OUTPUT"

      - name: Skip release
        if: steps.release_scope.outputs.should_publish != 'true'
        run: printf '%s\n' 'Skipping release because only workflow, docs, or agent instruction files changed.'

      - name: Download Windows app artifact from CI
        if: steps.release_scope.outputs.should_publish == 'true'
        uses: actions/download-artifact@v4
        with:
          name: ds-controller-pc-app
          path: package/pc
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Download NDS ROM artifact from CI
        if: steps.release_scope.outputs.should_publish == 'true'
        uses: actions/download-artifact@v4
        with:
          name: ds-controller-nds
          path: package/nds
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Create release zip
        if: steps.release_scope.outputs.should_publish == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p dist
          (cd package && zip -r -D "../dist/ds-controller-${VERSION}.zip" pc nds)

      - name: Verify release zip contents
        if: steps.release_scope.outputs.should_publish == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          zipinfo -1 "dist/ds-controller-${VERSION}.zip" | sort > actual.txt
          cat > expected.txt <<'EOF'
          nds/ds-controller.ini
          nds/ds-controller.nds
          pc/WebView2Loader.dll
          pc/ds-controller.exe
          EOF
          diff -u expected.txt actual.txt

      - name: Generate release notes
        if: steps.release_scope.outputs.should_publish == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TARGET_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          previous_tag="$(git describe --tags --abbrev=0 "${TARGET_SHA}^" 2>/dev/null || true)"

          if [ -n "$previous_tag" ]; then
            commit_range="${previous_tag}..${TARGET_SHA}"
            compare_url="https://github.com/${GITHUB_REPOSITORY}/compare/${previous_tag}...${VERSION}"
          else
            commit_range="$TARGET_SHA"
            compare_url=""
          fi

          commit_lines="$(git log --reverse --pretty=format:'- %s (%h)' "$commit_range")"

          {
            printf '## Changes\n\n'

            if [ -n "$commit_lines" ]; then
              printf '%s\n' "$commit_lines"
            else
              printf -- '- No commit changes detected.\n'
            fi

            printf '\n## Artifacts\n\n'
            printf -- "- Windows app: \`pc/ds-controller.exe\`\n"
            printf -- "- WebView2 loader: \`pc/WebView2Loader.dll\`\n"
            printf -- "- Nintendo DS ROM: \`nds/ds-controller.nds\`\n"
            printf -- "- DS config example: \`nds/ds-controller.ini\`\n"

            printf '\n## Verification\n\n'
            printf -- "- \`make test\`\n"
            printf -- "- \`make pc\`\n"
            printf -- "- \`make nds\`\n"

            printf '\n## Full changelog\n\n'

            if [ -n "$compare_url" ]; then
              printf '%s\n' "$compare_url"
            else
              printf 'Initial release from %s.\n' "$TARGET_SHA"
            fi
          } > release-notes.md

      - name: Publish release
        if: steps.release_scope.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          TARGET_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          gh release create "$VERSION" dist/*.zip \
            --target "$TARGET_SHA" \
            --title "ds-controller ${VERSION}" \
            --notes-file release-notes.md \
            --latest
